name: Greetings

on: [ pull_request_target, issues ]
permissions:
  contents: read
jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
        with:
          egress-policy: audit

      - uses: actions/first-interaction@1c4688942c71f71d4f5502a26ea67c331730fa4d # v3.1.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: "Hello and thank you for opening an issue. We'll look into it as
            soon as possible."
          pr-message: "Hello and thank you for opening a pull request. We'll review it and
            make a decision as soon as possible."
